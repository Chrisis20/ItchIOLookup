<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Itch.io Asset Search</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 20px; 
            background-color: #121212; /* Dark background */
            color: #e0e0e0; /* Light text */
        }
        h1 { color: #ffffff; }
        input {
            padding: 10px;
            margin-right: 10px;
            background-color: #2a2a2a;
            border: 1px solid #444;
            color: #ffffff;
            border-radius: 4px;
            outline: none;
        }
        input:focus { border-color: #fa5c5c; }
        button {
            padding: 10px 15px;
            background-color: #fa5c5c; /* Itch.io red/pink */
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        button:hover { background-color: #e04a4a; }
        .card { 
            background-color: #1e1e1e; 
            padding: 15px; 
            margin: 15px 0; 
            border-radius: 8px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.2); 
            border: 1px solid #333;
        }
        .card h3 { margin-top: 0; }
        .card a { 
            color: #fa5c5c; 
            text-decoration: none; 
            font-size: 1.1em; 
        }
        .card a:hover { text-decoration: underline; }
        img { 
            max-width: 250px; 
            border-radius: 4px; 
            display: block; 
            margin-top: 10px; 
        }
    </style>
</head>
<body>
    <h1>Search Free Assets</h1>
    <input type="text" id="searchInput" placeholder="Search (e.g. sword)">
    <input type="text" id="tagInput" placeholder="Tag (e.g. 3d)">
    <button onclick="performSearch()">Search</button>

    <div id="results" style="margin-top: 20px;"></div>

    <script src="app.js"></script>
</body>
</html>
